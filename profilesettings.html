<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile Settings</title>
<link rel="stylesheet" href="profilesettings.css">
</head>

<body>

<h1>Profile Settings</h1>

<div class="container">

    <!-- PROFILE INITIALS -->
    <div class="profile-circle" id="profileCircle">SM</div>

    <label>First Name:</label>
    <input type="text" id="firstName" placeholder="Xandra"><br>

    <label>Last Name:</label>
    <input type="text" id="lastName" placeholder="Alex"><br>

    <label>Email:</label>
    <input type="email" id="email" placeholder="xandra.alex@gmail.com"><br>

    <label>Phone:</label>
    <input type="text" id="phone" placeholder="0712345678"><br>

    <label>Unit Number:</label>
    <input type="text" id="unit" placeholder="204"><br>

    <label>Password:</label>
    <input type="password" id="password"><br>

    <label>Confirm Password:</label>
    <input type="password" id="confirmPassword"><br>

    <h3>Notifications</h3>

    <div class="toggle-row">
        <span>Email Alerts</span>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>

    <div class="toggle-row">
        <span>SMS Alerts</span>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>

    <button id="saveBtn">Save Changes</button>

    <p id="message"></p>

</div>

<script src="profilesettings.js"></script>
</body>
</html>
